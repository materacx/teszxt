<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>mObywatel - ID</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 420px;
            margin: auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .photo {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px auto;
            background: #ddd;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .row {
            margin: 10px 0;
            font-size: 15px;
        }

        .label {
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

<div class="card">
    <img id="photo" class="photo" src="" alt="zdjęcie">

    <h2>Dokument tożsamości</h2>

    <div class="row"><span class="label">Imię:</span> <span id="name"></span></div>
    <div class="row"><span class="label">Nazwisko:</span> <span id="surname"></span></div>
    <div class="row"><span class="label">Płeć:</span> <span id="sex"></span></div>
    <div class="row"><span class="label">Data urodzenia:</span> <span id="birthday"></span></div>
    <div class="row"><span class="label">Obywatelstwo:</span> <span id="nationality"></span></div>
    <div class="row"><span class="label">Miejsce urodzenia:</span> <span id="birthPlace"></span></div>
    <div class="row"><span class="label">Kraj urodzenia:</span> <span id="countryOfBirth"></span></div>

    <div class="row"><span class="label">Adres:</span> <span id="adress1"></span></div>
    <div class="row"><span class="label">Kod pocztowy:</span> <span id="adress2"></span></div>
    <div class="row"><span class="label">Miasto:</span> <span id="city"></span></div>

    <div class="row"><span class="label">Seria i numer:</span> <span id="seria_numer"></span></div>
    <div class="row"><span class="label">Wydany:</span> <span id="wydany"></span></div>
    <div class="row"><span class="label">Ważność:</span> <span id="waznosc"></span></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);

    function set(id) {
        const el = document.getElementById(id);
        if (el) el.textContent = params.get(id) || "-";
    }

    set("name");
    set("surname");
    set("sex");
    set("birthday");
    set("nationality");
    set("birthPlace");
    set("countryOfBirth");
    set("adress1");
    set("adress2");
    set("city");
    set("seria_numer");
    set("wydany");
    set("waznosc");

    // zdjęcie
    const img = params.get("image");
    if (img) {
        document.getElementById("photo").src = img;
    } else {
        document.getElementById("photo").style.display = "none";
    }
</script>

</body>
</html>
